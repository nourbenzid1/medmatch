name: Sync Google Sheets

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync
        run: |
          curl -X POST https://medmatch-ias9.onrender.com/api/sheets/sync \
            --max-time 300 \
            --retry 3 \
            --retry-delay 30
