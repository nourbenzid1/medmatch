name: Sync Google Sheets

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync-doctors:
    runs-on: ubuntu-latest
    steps:
      - name: Sync doctors
        run: curl -X POST "https://medmatch-production.up.railway.app/api/sheets/sync?only=doctors" --max-time 120

  sync-hospitals:
    runs-on: ubuntu-latest
    needs: sync-doctors
    steps:
      - name: Wait
        run: sleep 30
      - name: Sync hospitals
        run: curl -X POST "https://medmatch-production.up.railway.app/api/sheets/sync?only=hospitals" --max-time 120

  sync-offers:
    runs-on: ubuntu-latest
    needs: sync-hospitals
    steps:
      - name: Wait
        run: sleep 30
      - name: Sync offers
        run: curl -X POST "https://medmatch-production.up.railway.app/api/sheets/sync?only=offers" --max-time 300
